name: Build Hamlib rigctld

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'SESSION_NOTES.md'
      - 'BACKLOG.md'
  workflow_dispatch:
    inputs:
      hamlib_version:
        description: 'Hamlib git ref (tag, branch, or SHA)'
        default: 'master'
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: macos-arm64
            archive: hamlib-macos-arm64.tar.gz
          - os: ubuntu-24.04
            target: linux-x86_64
            archive: hamlib-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: linux-arm64
            archive: hamlib-linux-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install automake autoconf libtool pkg-config

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y automake autoconf libtool pkg-config patchelf

      - name: Clone upstream Hamlib
        run: |
          HAMLIB_REF="${{ github.event.inputs.hamlib_version || 'master' }}"
          echo "Building Hamlib ref: $HAMLIB_REF"
          git clone --depth 1 --branch "$HAMLIB_REF" https://github.com/Hamlib/Hamlib.git hamlib-src || \
            (git clone https://github.com/Hamlib/Hamlib.git hamlib-src && cd hamlib-src && git checkout "$HAMLIB_REF")

      - name: Bootstrap
        working-directory: hamlib-src
        run: |
          # macOS ships Apple's libtool, not GNU libtool
          if [ "$(uname)" = "Darwin" ]; then
            export LIBTOOLIZE=glibtoolize
          fi
          ./bootstrap

      - name: Configure (minimal build)
        working-directory: hamlib-src
        run: |
          ./configure \
            --prefix="$PWD/dist" \
            --enable-shared=yes \
            --enable-static=no \
            --enable-silent-rules \
            --enable-html-matrix=no \
            --enable-usrp=no \
            --enable-winradio=no \
            --with-cxx-binding=no \
            --with-indi=no \
            --with-libusb=no \
            --with-lua-binding=no \
            --with-perl-binding=no \
            --with-python-binding=no \
            --with-readline=no \
            --with-tcl-binding=no \
            --with-xml-support=no

      - name: Build
        working-directory: hamlib-src
        run: make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)

      - name: Install
        working-directory: hamlib-src
        run: make install

      - name: Bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/bundle-macos.sh
          scripts/bundle-macos.sh hamlib-src/dist staging

      - name: Bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/bundle-linux.sh
          scripts/bundle-linux.sh hamlib-src/dist staging

      - name: Verify
        run: |
          chmod +x scripts/verify.sh
          scripts/verify.sh staging

      - name: Package archive
        run: tar czf ${{ matrix.archive }} -C staging rigctld lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          echo "Archives to publish:"
          ls -la release-assets/

      - name: Compute release tag
        id: tag
        run: |
          HAMLIB_REF="${{ github.event.inputs.hamlib_version || 'master' }}"
          DATE=$(date +%Y%m%d)
          RUN=${{ github.run_number }}

          if [ "$HAMLIB_REF" = "master" ]; then
            VERSION_TAG="vmaster-${DATE}-${RUN}"
          else
            VERSION_TAG="v${HAMLIB_REF}-${RUN}"
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "hamlib_ref=$HAMLIB_REF" >> "$GITHUB_OUTPUT"
          echo "Release tag: $VERSION_TAG"

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version_tag }}
          name: "Hamlib rigctld ${{ steps.tag.outputs.version_tag }}"
          body: |
            Pre-built `rigctld` binaries from upstream Hamlib (`${{ steps.tag.outputs.hamlib_ref }}`).

            **Targets:**
            - `hamlib-macos-arm64.tar.gz` — macOS Apple Silicon
            - `hamlib-linux-x86_64.tar.gz` — Linux x86_64
            - `hamlib-linux-arm64.tar.gz` — Linux ARM64

            Each archive extracts flat: `rigctld` + `lib/libhamlib.*`

            Built by GitHub Actions run #${{ github.run_number }}.
          files: release-assets/*
          prerelease: ${{ contains(steps.tag.outputs.hamlib_ref, 'rc') }}

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Hamlib rigctld (latest)"
          body: |
            **Latest** pre-built `rigctld` binaries from upstream Hamlib (`${{ steps.tag.outputs.hamlib_ref }}`).

            This release is automatically updated on each build. For a stable URL, use:
            ```
            https://github.com/KJ5HST-LABS/hamlib/releases/download/latest/hamlib-macos-arm64.tar.gz
            https://github.com/KJ5HST-LABS/hamlib/releases/download/latest/hamlib-linux-x86_64.tar.gz
            https://github.com/KJ5HST-LABS/hamlib/releases/download/latest/hamlib-linux-arm64.tar.gz
            ```

            Built from version tag `${{ steps.tag.outputs.version_tag }}`, run #${{ github.run_number }}.
          files: release-assets/*
          make_latest: true
